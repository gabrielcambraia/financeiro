name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR (inclui frontend)
        working-directory: backend
        run: mvn package -DskipTests -B

      - name: Montar pacote de distribuição
        run: |
          mkdir -p dist
          cp backend/target/backend-1.0.0.jar dist/financeiro.jar
          cp start-release.bat dist/start.bat

      - name: Criar ZIP
        run: |
          cd dist
          zip -r ../financeiro-${{ github.ref_name }}.zip .

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "Financeiro ${{ github.ref_name }}"
          body: |
            ## Como instalar / atualizar

            1. Baixe o arquivo `financeiro-${{ github.ref_name }}.zip`
            2. Extraia na mesma pasta onde já está instalado (ou em uma nova pasta)
            3. Execute o `start.bat`

            > O banco de dados **não é apagado** ao atualizar — seus dados ficam preservados.
          files: financeiro-${{ github.ref_name }}.zip
