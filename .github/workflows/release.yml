name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build JAR (frontend ja buildado, pula o plugin)
        working-directory: backend
        run: mvn package -DskipTests -B -P '!with-frontend'

      - name: Montar pacote de distribuicao
        run: |
          mkdir -p dist
          cp backend/target/backend-1.0.0.jar dist/financeiro.jar
          cp start-release.bat dist/start.bat

      - name: Criar ZIP
        run: |
          cd dist
          zip -r ../financeiro-${{ github.ref_name }}.zip .

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "Financeiro ${{ github.ref_name }}"
          body: |
            ## Como instalar

            1. Baixe o arquivo `financeiro-${{ github.ref_name }}.zip`
            2. Extraia em uma pasta de sua preferencia (ex: `C:\financeiro\`)
            3. **Clique com botao direito no `start.bat` → Propriedades → marque "Desbloquear" → OK**
               _(necessario apenas na primeira vez — o Windows bloqueia arquivos baixados da internet)_
            4. Execute o `start.bat`

            ## Como atualizar

            1. Baixe o ZIP da nova versao
            2. Extraia **na mesma pasta** onde ja esta instalado (substitui apenas o `.jar` e o `.bat`)
            3. Execute o `start.bat`

            > O banco de dados **nao e apagado** ao atualizar — seus dados ficam preservados.
          files: financeiro-${{ github.ref_name }}.zip
