spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
server.port=${PORT:8080}
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT (access token curto) + refresh token (sessão de inatividade)
financeiro.jwt.segredo=${JWT_SECRET}
financeiro.jwt.validade-acesso-minutos=${JWT_VALIDADE_ACESSO_MINUTOS:15}
financeiro.token-atualizacao.validade-minutos=${TOKEN_ATUALIZACAO_VALIDADE_MINUTOS:15}
financeiro.cookie.seguro=${COOKIE_SEGURO:true}

# CORS + verificação de Origin (CSRF defense-in-depth) — em produção, aponte
# para o domínio real via env var (lista separada por vírgula).
financeiro.cors.origens-permitidas=${CORS_ORIGENS_PERMITIDAS:http://localhost:5173,http://localhost:4173,http://localhost:3000}

# Actuator sob /api/actuator: cai automaticamente sob a regra de segurança
# "anyRequest().authenticated()" (evita o permitAll de rotas fora de /api/).
# Só health/metrics expostos — nunca env/beans/heapdump (vazam segredo/config).
management.endpoints.web.base-path=/api/actuator
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# Loga (sem valores de bind, por privacidade) qualquer query acima do limiar,
# com o tempo gasto — recurso nativo do Hibernate, sem dependência nova.
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=300
